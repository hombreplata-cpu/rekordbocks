name: Build Test Artifacts

# Pre-release release-candidate builds for sideloading / hardware testing.
# Runs on manual dispatch ONLY — the auto-on-push trigger was removed
# (2026-04-29) to bring GitHub Actions usage under budget. To cut an RC,
# trigger this workflow from the Actions tab with an explicit version + ref.
# Artifacts are NOT attached to GitHub Releases — they live in the workflow
# artifact store with 7-day retention. Real releases continue to flow through
# release.yml on tag push.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version stamp for this test build (e.g. 1.1.1-rc1)'
        required: false
        default: '0.0.0-test'
      ref:
        description: 'Branch or SHA to build from (REQUIRED — no default. Silent default to main caused PR #89 rc1-rc6 to build stale code.)'
        required: true

permissions:
  contents: read

concurrency:
  group: build-test-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - id: set
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            short=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "version=0.0.0-main-${short}" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Stamp version
        shell: pwsh
        run: |
          $ver = "${{ needs.resolve-version.outputs.version }}"
          Set-Content version.py "__version__ = '$ver'"
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build sqlcipher3 static
        env:
          SQLCIPHER_STATIC: "1"
        run: pip install --no-binary sqlcipher3 sqlcipher3

      - name: Verify pywebview imports cleanly (build-time guard)
        shell: pwsh
        run: |
          python -c "import webview; print('webview import OK')"
          python -c "import proxy_tools; print('proxy_tools OK')"
          python -c "import bottle; print('bottle OK')"
          python -c "import clr; print('clr OK')"

      - name: Build with PyInstaller
        # --clean: wipe PyInstaller cache before building so we never ship
        # bytecode from a previous (potentially incompatible) run.
        run: pyinstaller --clean app.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$env:VERSION installer\windows\boxcutter.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: BoxCutter-Setup-${{ env.VERSION }}.exe
          path: installer\windows\Output\BoxCutter-Setup-${{ env.VERSION }}.exe
          retention-days: 7
          if-no-files-found: error

      # Unpacked PyInstaller bundle. Used by bundle-smoke jobs so smoke can
      # run the bundle directly without installing it via Inno Setup
      # (the installer hangs in /VERYSILENT mode in CI; testing the bundle
      # itself is the real concern, installer behaviour is a separate test).
      - name: Upload unpacked Windows bundle (for smoke)
        uses: actions/upload-artifact@v7
        with:
          name: BoxCutter-bundle-windows-${{ env.VERSION }}
          path: dist/BoxCutter
          retention-days: 7
          if-no-files-found: error

  build-mac:
    needs: resolve-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Stamp version
        run: |
          ver="${{ needs.resolve-version.outputs.version }}"
          echo "__version__ = '$ver'" > version.py
          echo "VERSION=$ver" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install sqlcipher via Homebrew
        run: brew install sqlcipher

      - name: Build sqlcipher3
        # Use brew --prefix so we resolve correctly on both Apple Silicon
        # (/opt/homebrew/opt/sqlcipher) and Intel (/usr/local/opt/sqlcipher)
        # macOS runners. macos-latest is now ARM64.
        run: |
          export SQLCIPHER_PATH="$(brew --prefix sqlcipher)"
          echo "SQLCIPHER_PATH=$SQLCIPHER_PATH"
          pip install sqlcipher3

      - name: Verify pywebview imports cleanly (build-time guard)
        # objc/Foundation/AppKit/WebKit are pyobjc — pywebview's Cocoa backend
        # depends on them. If any fail to import here, the bundle would launch
        # but webview.create_window() would raise ImportError at runtime,
        # producing a "silent" failure (Flask up, no window). Fail loudly here.
        run: |
          python -c "import webview; print('webview import OK')"
          python -c "import proxy_tools; print('proxy_tools OK')"
          python -c "import bottle; print('bottle OK')"
          python -c "import objc; print('objc OK')"
          python -c "import Foundation; print('Foundation OK')"
          python -c "import AppKit; print('AppKit OK')"
          python -c "import WebKit; print('WebKit OK')"

      - name: Generate macOS icon
        run: iconutil -c icns assets/icons/icon.iconset -o static/boxcutter.icns

      - name: Build app bundle
        run: pyinstaller --clean app.spec

      - name: Ad-hoc codesign .app
        # Unsigned PyInstaller bundles on macOS 14+/15 have child execs (the
        # bootloader's _MEIPASS extract+re-exec) silently killed by Gatekeeper,
        # producing the "approved but app does nothing, no logs" symptom v1.1
        # Mac users reported. Ad-hoc signing (`-` identity) does not require
        # an Apple Developer account and clears that class of rejection.
        #
        # IMPORTANT: do NOT add --options runtime here. Hardened runtime is
        # required for notarization, but it also requires entitlements
        # granting Python the right to allocate executable memory
        # (com.apple.security.cs.allow-unsigned-executable-memory,
        # com.apple.security.cs.allow-jit). Without those entitlements, the
        # kernel kills the bundle at exec time before launcher.py runs —
        # exactly the silent-bounce-and-die that this fix is meant to solve.
        # Since we are not notarizing (no Developer ID), plain ad-hoc
        # signing without runtime hardening is the correct setting.
        run: |
          codesign --deep --force --sign - dist/BoxCutter.app
          codesign --verify --deep --strict --verbose=2 dist/BoxCutter.app

      - name: Smoke-test .app launches and serves
        # The v1.1 silent-failure happened because the .app's bootloader was
        # killed by Gatekeeper before launcher.py:29-37 could write the trace
        # file. Launch the bundle WITHOUT BOXCUTTER_TESTING — the real user
        # double-click code path — and confirm (a) the trace file appears
        # (proves Python interpreter ran past line 37), (b) Flask actually
        # serves on the bind host. Cannot exercise webview.start() (no display
        # in CI), but everything UP TO it including pyobjc backend imports is
        # exercised by webview.create_window before start() is reached.
        run: |
          set -euo pipefail
          rm -f /tmp/boxcutter-launcher-trace.txt
          port=$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1",0)); print(s.getsockname()[1]); s.close()')
          echo "Using port $port"
          BOXCUTTER_PORT="$port" "dist/BoxCutter.app/Contents/MacOS/BoxCutter" &
          bundle_pid=$!
          ready=0
          for i in $(seq 1 30); do
            if [ -f /tmp/boxcutter-launcher-trace.txt ] && \
               curl -sfo /dev/null "http://127.0.0.1:$port/api/rekordbox_status"; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ -f /tmp/boxcutter-launcher-trace.txt ]; then
            echo "--- launcher trace ---"
            cat /tmp/boxcutter-launcher-trace.txt
            echo "----------------------"
          else
            echo "ERROR: /tmp/boxcutter-launcher-trace.txt not written —"
            echo "  the bundle's Python interpreter never ran. Codesign /"
            echo "  Gatekeeper fix did not take."
          fi
          kill "$bundle_pid" 2>/dev/null || true
          wait "$bundle_pid" 2>/dev/null || true
          if [ "$ready" -ne 1 ]; then
            echo "ERROR: Smoke test did not reach a serving state within 30s."
            exit 1
          fi
          echo "Smoke OK — bundle launched, trace written, Flask served."

      - name: Create DMG
        run: |
          npm install -g create-dmg
          create-dmg dist/BoxCutter.app dist/ || true
          mv dist/*.dmg "dist/BoxCutter-${VERSION}.dmg"

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: BoxCutter-${{ env.VERSION }}.dmg
          path: dist/BoxCutter-${{ env.VERSION }}.dmg
          retention-days: 7
          if-no-files-found: error

      # Unpacked .app bundle. Used by bundle-smoke jobs so smoke can run
      # the bundle directly without going through DMG mount/copy in CI.
      - name: Upload unpacked macOS .app bundle (for smoke)
        uses: actions/upload-artifact@v7
        with:
          name: BoxCutter-bundle-macos-${{ env.VERSION }}
          path: dist/BoxCutter.app
          retention-days: 7
          if-no-files-found: error
