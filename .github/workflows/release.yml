name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing release artifacts off any branch without
  # cutting a real version tag. Use the Actions tab → Release → Run workflow.
  # Artifacts are produced exactly as for a tag run; the only difference is
  # softprops/action-gh-release uploads are no-ops without a tag context, so
  # nothing publishes to the Releases page. Download the .dmg / .exe from the
  # run's "Artifacts" section at the bottom of the run page.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    # Skip on workflow_dispatch — the only reason to dispatch this workflow
    # manually is to test a Mac .dmg fix without cutting a real release tag.
    # Building Windows for a non-tag run would also fail at the version
    # stamp step (which assumes a v* tag). bundle-smoke-windows and
    # publish-manifest depend on this job and skip transitively.
    if: github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Stamp version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          Set-Content version.py "__version__ = '$ver'"
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build sqlcipher3 static
        env:
          SQLCIPHER_STATIC: "1"
        run: pip install --no-binary sqlcipher3 sqlcipher3

      - name: Verify pywebview imports cleanly (build-time guard)
        # If `import webview` fails, PyInstaller's collect_submodules('webview')
        # silently returns [] and the resulting exe crashes at start() with no
        # log. Fail loudly here instead of shipping a broken installer.
        shell: pwsh
        run: |
          python -c "import webview; print('webview import OK')"
          python -c "import proxy_tools; print('proxy_tools OK')"
          python -c "import bottle; print('bottle OK')"
          python -c "import clr; print('clr OK')"

      - name: Build with PyInstaller
        run: pyinstaller --clean app.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$env:VERSION installer\windows\boxcutter.iss

      # The installer is uploaded twice: once as a workflow artifact so the
      # bundle-smoke-windows job can install it for testing in this same run,
      # and once as a Release asset for end users. Without the workflow-artifact
      # copy, the smoke gate would have to round-trip through gh release
      # download — which would only work AFTER the asset is published, defeating
      # the purpose of a pre-publish gate.
      - name: Upload installer (workflow artifact for smoke gate)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: installer\windows\Output\BoxCutter-Setup-${{ env.VERSION }}.exe
          retention-days: 1
          if-no-files-found: error

      - name: Upload installer (Release asset)
        uses: softprops/action-gh-release@v2
        with:
          files: installer\windows\Output\BoxCutter-Setup-${{ env.VERSION }}.exe

      # Unpacked PyInstaller bundle for smoke gate (skip Inno Setup install)
      - name: Upload unpacked Windows bundle (workflow artifact for smoke)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-bundle
          path: dist/BoxCutter
          retention-days: 1
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Stamp version
        # On a tag push, github.ref_name is e.g. "v1.1.0" — strip leading v
        # for the canonical version string. On workflow_dispatch (branch run
        # for testing a Mac fix), there is no tag — stamp 0.0.0-dev so the
        # build still produces a working artifact without colliding with any
        # real released version. version.py and VERSION env stay in sync.
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${{ github.ref_name }}"
            ver="${ver#v}"
          else
            ver="0.0.0-dev"
          fi
          echo "__version__ = '$ver'" > version.py
          echo "VERSION=$ver" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install sqlcipher via Homebrew
        run: brew install sqlcipher

      - name: Build sqlcipher3
        # Use brew --prefix so we resolve correctly on both Apple Silicon
        # (/opt/homebrew/opt/sqlcipher) and Intel (/usr/local/opt/sqlcipher)
        # macOS runners. macos-latest is now ARM64; the prior hard-coded
        # /usr/local/opt path was Intel-only and only worked via pkg-config
        # fallback. Making this explicit removes a build-env variable.
        run: |
          export SQLCIPHER_PATH="$(brew --prefix sqlcipher)"
          echo "SQLCIPHER_PATH=$SQLCIPHER_PATH"
          pip install sqlcipher3

      - name: Verify pywebview imports cleanly (build-time guard)
        # Mirrors the Windows guard above. webview's Cocoa backend depends on
        # pyobjc — if any of these imports fail, the bundle would launch but
        # webview.create_window() would raise ImportError at runtime, leaving
        # the user with a "silent" failure (Flask up, no window). Fail loudly
        # here instead of shipping a broken .dmg.
        run: |
          python -c "import webview; print('webview import OK')"
          python -c "import proxy_tools; print('proxy_tools OK')"
          python -c "import bottle; print('bottle OK')"
          python -c "import objc; print('objc OK')"
          python -c "import Foundation; print('Foundation OK')"
          python -c "import AppKit; print('AppKit OK')"
          python -c "import WebKit; print('WebKit OK')"

      - name: Generate macOS icon
        run: iconutil -c icns assets/icons/icon.iconset -o static/boxcutter.icns

      - name: Build app bundle
        run: pyinstaller --clean app.spec

      - name: Ad-hoc codesign .app
        # Unsigned PyInstaller bundles on macOS 14+/15 have child execs
        # (the bootloader's _MEIPASS extract+re-exec) silently killed by
        # Gatekeeper, producing the "approved but app does nothing, no
        # logs" symptom v1.1 Mac users reported. Ad-hoc signing (`-`
        # identity) does not require an Apple Developer account and
        # clears that class of rejection.
        #
        # IMPORTANT: do NOT add --options runtime here. Hardened runtime
        # is required for notarization, but it also requires entitlements
        # granting Python the right to allocate executable memory
        # (com.apple.security.cs.allow-unsigned-executable-memory,
        # com.apple.security.cs.allow-jit). Without those entitlements,
        # the kernel kills the bundle at exec time before launcher.py
        # runs — exactly the silent-bounce-and-die we are fixing. Since
        # we are not notarizing (no Developer ID), plain ad-hoc signing
        # without runtime hardening is the correct setting. Proper
        # Developer ID + notarytool + entitlements is a follow-up.
        run: |
          codesign --deep --force --sign - dist/BoxCutter.app
          codesign --verify --deep --strict --verbose=2 dist/BoxCutter.app

      - name: Create DMG
        run: |
          npm install -g create-dmg
          create-dmg dist/BoxCutter.app dist/ || true
          mv dist/*.dmg dist/boxcutter-mac.dmg

      - name: Upload DMG (workflow artifact for smoke gate)
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-dmg
          path: dist/boxcutter-mac.dmg
          retention-days: 1
          if-no-files-found: error

      - name: Upload DMG (Release asset)
        # Only on a tag push — workflow_dispatch runs have no associated
        # GitHub Release to attach to and would error here. The .dmg is
        # still available as a workflow artifact (release-macos-dmg) for
        # download from the run page in either case.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/boxcutter-mac.dmg

      # Unpacked .app bundle for smoke gate (skip DMG mount path)
      - name: Upload unpacked .app bundle (workflow artifact for smoke)
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-app
          path: dist/BoxCutter.app
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # bundle-smoke gate — Layers 1/2/3 against the freshly-built artifact
  # before SHA manifest publishes. Failure here means the SHA manifest
  # never gets attached to the Release, which means auto-updater clients
  # cannot verify and refuse to download. A broken bundle physically
  # cannot ship a complete release.
  # ---------------------------------------------------------------------------
  bundle-smoke-windows:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir pytest playwright mutagen
          playwright install chromium
        shell: pwsh

      - name: Download unpacked Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: release-windows-bundle
          path: bundle

      - name: Locate bundle exe + scripts
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path bundle -Recurse -Filter "BoxCutter.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "BoxCutter.exe not found"; exit 1 }
          $bundleRoot = $exe.Directory.FullName
          $scripts = Join-Path $bundleRoot "_internal\scripts"
          if (-not (Test-Path $scripts)) { Write-Error "scripts dir not found"; exit 1 }
          "BOXCUTTER_EXE=$($exe.FullName)" | Out-File $env:GITHUB_ENV -Append
          "BUNDLED_SCRIPTS=$scripts" | Out-File $env:GITHUB_ENV -Append

      - name: Layer 1 — verify_imports
        # Start-Process -Wait — BoxCutter.exe is a windowed PyInstaller build,
        # PowerShell's `&` returns immediately without waiting. We need
        # explicit -Wait + redirected output to run synchronously.
        shell: pwsh
        run: |
          $script = (Resolve-Path tests/bundle/verify_imports.py).Path
          $proc = Start-Process -FilePath $env:BOXCUTTER_EXE `
            -ArgumentList $script `
            -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput verify_out.txt `
            -RedirectStandardError verify_err.txt
          Get-Content verify_out.txt
          if (Test-Path verify_err.txt -PathType Leaf) { Get-Content verify_err.txt }
          if ($proc.ExitCode -ne 0) { Write-Error "verify_imports failed (exit $($proc.ExitCode))"; exit $proc.ExitCode }

      - name: Layer 2 — run_all_scripts
        shell: pwsh
        run: |
          $script = (Resolve-Path tests/bundle/run_all_scripts.py).Path
          $fixtures = (Resolve-Path tests/bundle/fixtures).Path
          python $script `
            --bundle-exe "$env:BOXCUTTER_EXE" `
            --scripts-dir "$env:BUNDLED_SCRIPTS" `
            --fixtures-dir "$fixtures"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Layer 3 — Playwright UI contract
        env:
          BOXCUTTER_BUNDLE_EXE: ${{ env.BOXCUTTER_EXE }}
          BOXCUTTER_TESTING: "1"
        shell: pwsh
        run: pytest tests/bundle/ui/ -v --tb=short

  bundle-smoke-macos:
    needs: build-mac
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir pytest playwright mutagen
          playwright install chromium

      - name: Download unpacked .app bundle
        uses: actions/download-artifact@v4
        with:
          name: release-macos-app
          path: bundle

      - name: Reconstitute .app bundle (artifact download flattens the dir)
        run: |
          if [ -d "bundle/Contents" ]; then
            mkdir -p /tmp/BoxCutter.app
            cp -R bundle/* /tmp/BoxCutter.app/
          else
            inner=$(find bundle -maxdepth 2 -name "Contents" -type d | head -1)
            cp -R "$(dirname "$inner")" /tmp/BoxCutter.app
          fi
          chmod +x /tmp/BoxCutter.app/Contents/MacOS/BoxCutter
          echo "BOXCUTTER_APP=/tmp/BoxCutter.app" >> "$GITHUB_ENV"

      - name: Locate bundle exe + scripts
        run: |
          exe="$BOXCUTTER_APP/Contents/MacOS/BoxCutter"
          if [ ! -x "$exe" ]; then ls -la "$BOXCUTTER_APP/Contents/MacOS"; exit 1; fi
          scripts=""
          for c in \
              "$BOXCUTTER_APP/Contents/Resources/scripts" \
              "$BOXCUTTER_APP/Contents/Frameworks/scripts" \
              "$BOXCUTTER_APP/Contents/MacOS/scripts" \
              "$BOXCUTTER_APP/Contents/Resources/_internal/scripts" \
              "$BOXCUTTER_APP/Contents/MacOS/_internal/scripts"; do
            if [ -d "$c" ]; then scripts="$c"; break; fi
          done
          if [ -z "$scripts" ]; then
            echo "scripts/ not found — dumping layout:"
            find "$BOXCUTTER_APP" -name "strip_comment_urls.py" -type f
            exit 1
          fi
          echo "BOXCUTTER_EXE=$exe" >> "$GITHUB_ENV"
          echo "BUNDLED_SCRIPTS=$scripts" >> "$GITHUB_ENV"

      - name: Layer 1 — verify_imports
        # Absolute path — launcher does os.chdir(_MEIPASS) before
        # resolving sys.argv[1].
        run: |
          script="$(realpath tests/bundle/verify_imports.py)"
          "$BOXCUTTER_EXE" "$script"

      - name: Layer 2 — run_all_scripts
        run: |
          python "$(realpath tests/bundle/run_all_scripts.py)" \
            --bundle-exe "$BOXCUTTER_EXE" \
            --scripts-dir "$BUNDLED_SCRIPTS" \
            --fixtures-dir "$(realpath tests/bundle/fixtures)"

      - name: Layer 3 — Playwright UI contract
        env:
          BOXCUTTER_BUNDLE_EXE: ${{ env.BOXCUTTER_EXE }}
          BOXCUTTER_TESTING: "1"
        run: pytest tests/bundle/ui/ -v --tb=short

      - name: Layer 4 — GUI-path launch (no BOXCUTTER_TESTING)
        # The v1.1 Mac silent-failure happened because the .app's bootloader
        # was killed by Gatekeeper before launcher.py:29-37 could write the
        # trace file. This layer launches the bundle WITHOUT the testing
        # bypass — i.e. the same code path users hit on double-click — and
        # confirms (a) the trace file is written (proving the interpreter
        # ran past line 29), (b) Flask actually serves on the bind host,
        # (c) the process stays alive long enough to hand off to webview.
        # Cannot exercise webview.start() itself (CI has no display), but
        # everything UP TO webview.start() — including pyobjc backend
        # imports inside webview.create_window — is exercised.
        run: |
          set -euo pipefail
          rm -f /tmp/boxcutter-launcher-trace.txt
          # Pick a free port so we don't collide with Layer 3's leftovers.
          port=$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1",0)); print(s.getsockname()[1]); s.close()')
          echo "Using port $port"
          # Launch the bundle in the background. Without BOXCUTTER_TESTING,
          # launcher.py reaches `import webview` + create_window. webview.start()
          # would block forever on a real display; in headless CI it raises
          # immediately, which the launcher's excepthook will log. Either way,
          # we get past the Gatekeeper-killable section and prove the bundle
          # is live.
          BOXCUTTER_PORT="$port" "$BOXCUTTER_EXE" &
          bundle_pid=$!
          # Poll for trace + HTTP readiness. 30s budget — Flask cold start
          # on macOS runners is slow.
          ready=0
          for i in $(seq 1 30); do
            if [ -f /tmp/boxcutter-launcher-trace.txt ] && \
               curl -sfo /dev/null "http://127.0.0.1:$port/api/rekordbox_status"; then
              ready=1
              break
            fi
            sleep 1
          done
          # Always print the trace file if it exists (diagnostics on failure).
          if [ -f /tmp/boxcutter-launcher-trace.txt ]; then
            echo "--- launcher trace ---"
            cat /tmp/boxcutter-launcher-trace.txt
            echo "----------------------"
          else
            echo "ERROR: /tmp/boxcutter-launcher-trace.txt not written —"
            echo "  the bundle's Python interpreter never ran. This is the"
            echo "  v1.1 Mac silent-failure symptom; codesign / Gatekeeper"
            echo "  fix did not take."
          fi
          # Clean up the bundle process whether we're passing or failing.
          kill "$bundle_pid" 2>/dev/null || true
          wait "$bundle_pid" 2>/dev/null || true
          if [ "$ready" -ne 1 ]; then
            echo "ERROR: Layer 4 did not reach a serving state within 30s."
            exit 1
          fi
          echo "Layer 4 OK — bundle launched, trace written, Flask served."

  publish-manifest:
    # R-03: hash all release assets in one Linux job and publish SHA256SUMS so
    # the auto-updater can verify integrity of the installer it downloads.
    # Single canonical format = single parser in app.py = smaller attack surface.
    #
    # Gated behind bundle-smoke — if any layer fails on either OS, the
    # SHA manifest never publishes, the Release stays in a half-published
    # state, and the auto-updater refuses to verify (because /SHA256SUMS
    # 404s). A broken bundle physically cannot ship a complete release.
    needs: [bundle-smoke-windows, bundle-smoke-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p assets
          cd assets
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern '*.exe' \
            --pattern '*.dmg'
          ls -la

      - name: Generate SHA256SUMS
        working-directory: assets
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/SHA256SUMS
